name: Keep-Alive Smoke Check

on:
  workflow_dispatch:
  push:
    branches:
      - master
  schedule:
    - cron: "*/30 * * * *"

jobs:
  smoke-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate keep-alive endpoints
        env:
          RENDER_BASE_URL: ${{ secrets.RENDER_BASE_URL }}
        run: |
          if [ -z "$RENDER_BASE_URL" ]; then
            echo "RENDER_BASE_URL secret is not set. Skipping smoke check."
            exit 0
          fi
          python scripts/smoke_check.py "$RENDER_BASE_URL"
